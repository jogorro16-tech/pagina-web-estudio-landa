  <!-- ── Contenido principal ────────────────────────────────────────────── -->
  <main>
    <section class="contacto">

      <div class="page-header page-header--dark">
        <span class="page-header__num" aria-hidden="true">05</span>
        <hr class="page-header__rule">
        <div class="page-header__body">
          <span class="page-header__tag">Contacto</span>
          <h1 class="page-header__title"><span class="title-red-box">Hablemos</span> de tu <em>proyecto</em></h1>
        </div>
        <hr class="page-header__rule">
      </div>

      <div class="contacto__grid">

        <!-- Formulario -->
        <form class="contacto__form" id="contact-form"
              action="https://api.web3forms.com/submit"
              method="POST">

          <input type="hidden" name="access_key" value="3a1a8129-66ba-4bd7-8c58-b31536170e00">
          <input type="hidden" name="subject" value="Nuevo contacto — Estudio Landa">
          <input type="hidden" name="from_name" value="Estudio Landa Web">
          <input type="checkbox" name="botcheck" style="display:none">

          <div class="form-group">
            <label class="form-label" for="nombre">Nombre</label>
            <input class="form-input" id="nombre" name="nombre" type="text" placeholder="Tu nombre completo" required>
          </div>

          <div class="form-group">
            <label class="form-label" for="email">Correo electrónico</label>
            <input class="form-input" id="email" name="email" type="email" placeholder="correo@ejemplo.com" required>
          </div>

          <div class="form-group">
            <label class="form-label" for="proyecto">Tipo de proyecto</label>
            <input class="form-input" id="proyecto" name="proyecto" type="text" placeholder="Casa habitación, oficina, renovación…">
          </div>

          <div class="form-group">
            <label class="form-label" for="mensaje">Mensaje</label>
            <textarea class="form-textarea" id="mensaje" name="mensaje" placeholder="Cuéntanos sobre tu idea o proyecto…" rows="4"></textarea>
          </div>

          <button class="form-submit" type="submit" id="submit-btn">
            Enviar mensaje
            <span>→</span>
          </button>

          <p id="form-status" style="display:none; margin-top:1rem; font-size:0.85rem; letter-spacing:0.06em; color:var(--color-sage-lt);"></p>

        </form>

        <!-- Información de contacto -->
        <div class="contacto__info">

          <div>
            <p class="contacto__email-label">Escríbenos directo</p>
            <a class="contacto__email-link" href="mailto:hola@estudiolanda.mx">
              hola@estudiolanda.mx
            </a>
          </div>

          <div>
            <p class="contacto__email-label">Ubicación</p>
            <p class="contacto__address">
              México<br>
              Disponibles para proyectos<br>en todo el país
            </p>
          </div>

          <div class="contacto__social">
            <a class="social-link" href="https://www.instagram.com/estudiolanda/" target="_blank" rel="noopener">
              Instagram <span>↗</span>
            </a>
            <a class="social-link" href="#" target="_blank" rel="noopener">
              Houzz <span>↗</span>
            </a>
            <a class="social-link" href="#" target="_blank" rel="noopener">
              LinkedIn <span>↗</span>
            </a>
          </div>

        </div>

      </div>

  <script>
    /* Año en footer */
    document.querySelectorAll('[data-year]').forEach(el => {
      el.textContent = new Date().getFullYear();
    });

    /* Envío de formulario */
    const form = document.getElementById('contact-form');
    const statusEl = document.getElementById('form-status');

    if (form) {
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submit-btn');
        btn.disabled = true;
        btn.innerHTML = 'Enviando <span>→</span>';

        try {
          const res = await fetch(form.action, {
            method: 'POST',
            body: new FormData(form),
            headers: { 'Accept': 'application/json' }
          });
          if (res.ok) {
            statusEl.style.display = 'block';
            statusEl.textContent = 'Mensaje enviado con éxito. Nos pondremos en contacto pronto.';
            form.reset();
            btn.innerHTML = 'Enviado ✓ <span></span>';
            setTimeout(() => {
              btn.innerHTML = 'Enviar mensaje <span>→</span>';
              btn.disabled = false;
              statusEl.style.display = 'none';
            }, 4000);
          } else {
            throw new Error();
          }
        } catch {
          btn.innerHTML = 'Inténtalo de nuevo <span>→</span>';
          btn.disabled = false;
          statusEl.style.display = 'block';
          statusEl.style.color = 'rgba(243,52,20,0.8)';
          statusEl.textContent = 'Hubo un error. Por favor escríbenos a hola@estudiolanda.mx';
          setTimeout(() => { statusEl.style.display = 'none'; }, 5000);
        }
      });
    }
  </script>
